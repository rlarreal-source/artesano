<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Artesano">
<title>Artesano</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f5ede0}
body{color:#2a2a22;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;padding-bottom:80px;-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:inherit;-webkit-appearance:none;appearance:none}
#hdr{background:#fff;border-bottom:1px solid rgba(58,90,46,.12);padding:max(env(safe-area-inset-top),10px) 16px 8px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:10px}
#logo-img{height:54px;width:auto;max-width:240px;object-fit:contain}
.hdr-r{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
#hdt{font-size:10px;color:#7a7a6a}
#hti{font-size:9px;color:#bbb}
#sb{font-size:10px;padding:2px 8px;border-radius:10px;cursor:pointer;white-space:nowrap}
#sb.off{background:#fef3c7;color:#92400e}
#sb.on{background:#d1fae5;color:#065f46}
#sb.syncing{background:#dbeafe;color:#1e40af}
#sb.err{background:#fee2e2;color:#991b1b}
#bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid rgba(58,90,46,.12);display:flex;justify-content:space-around;padding:5px 0;padding-bottom:max(5px,env(safe-area-inset-bottom));z-index:100}
.nb{background:none;border:none;color:#bbb;display:flex;flex-direction:column;align-items:center;gap:1px;font-size:19px;cursor:pointer;padding:3px 5px}
.nb span{font-size:8px;letter-spacing:.5px}.nb.active{color:#3a5a2e}.nb.active span{font-weight:700}
#cnt{padding:0 14px;max-width:900px;margin:0 auto}
.sec{display:none;padding-top:14px}.sec.active{display:block}
.card{background:#fff;border:1px solid rgba(58,90,46,.1);border-radius:14px;padding:14px;margin-bottom:10px}
.clbl{font-size:10px;color:#7a7a6a;letter-spacing:2px;text-transform:uppercase;font-weight:500;margin-bottom:7px}
.btn{padding:5px 12px;border-radius:20px;border:1px solid rgba(58,90,46,.2);background:transparent;color:#7a7a6a;font-size:11px;cursor:pointer;white-space:nowrap}
.btn.act{border-color:#3a5a2e;background:rgba(58,90,46,.08);color:#3a5a2e;font-weight:600}
.btn-g{background:#3a5a2e;border:none;border-radius:12px;padding:10px 16px;color:#fff;font-weight:700;font-size:13px;cursor:pointer}
.btn-g:disabled{background:#bbb}
.btn-wa{display:block;background:#25D366;border:none;border-radius:12px;padding:14px;color:#fff;font-weight:700;font-size:15px;text-align:center;text-decoration:none;margin-top:14px;width:100%}
.btn-red{border-color:#c4534a!important;color:#c4534a!important}
.btn-blue{border-color:#4a7a9a;color:#4a7a9a}
.inp{width:100%;padding:10px 13px;border-radius:10px;border:1px solid rgba(58,90,46,.2);background:#f5ede0;color:#2a2a22;font-size:14px}
.inp:focus{outline:none;border-color:#3a5a2e;background:#fff}
.sel{padding:10px 12px;border-radius:10px;border:1px solid rgba(58,90,46,.2);background:#f5ede0;color:#2a2a22;font-size:13px;width:100%}
.kg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0 12px}
.kg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:8px 0 12px}
.kc{background:#fff;border:1px solid rgba(58,90,46,.1);border-radius:12px;padding:12px;text-align:center}
.kl{font-size:9px;color:#7a7a6a;letter-spacing:1px;text-transform:uppercase}
.kv{font-size:19px;font-weight:700;color:#3a5a2e;margin-top:2px}
#mov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
#mov.open{display:block}
.mbox{background:#fff;border-radius:14px;max-width:520px;margin:0 auto}
.mhd{background:rgba(58,90,46,.08);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-radius:14px 14px 0 0}
.mhd h3{color:#3a5a2e;font-size:15px;font-weight:700}
.mbx{background:none;border:none;font-size:22px;color:#7a7a6a;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.mbdy{padding:16px}
.srw{position:relative;margin-bottom:10px}
.srdrop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid rgba(58,90,46,.2);border-radius:10px;max-height:220px;overflow-y:auto;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.12);display:none}
.srdrop.open{display:block}
.sri{padding:10px 14px;border-bottom:1px solid rgba(58,90,46,.06);display:flex;justify-content:space-between;align-items:center;font-size:13px;cursor:pointer}
.sri:active{background:rgba(58,90,46,.06)}
.irow{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid rgba(58,90,46,.07);font-size:12px}
.qb{width:32px;height:32px;border-radius:50%;border:1px solid rgba(58,90,46,.2);background:#f5ede0;color:#2a2a22;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qb.p{border-color:#3a5a2e;background:rgba(58,90,46,.08);color:#3a5a2e}
.oc{background:#fff;border:1px solid rgba(58,90,46,.1);border-radius:12px;padding:12px;margin-bottom:8px;border-left:3px solid #ddd}
.oc.ent{border-left-color:#3a5a2e}.oc.lst{border-left-color:#b89a5a}.oc.proc{border-left-color:#c4534a}
.sb{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:600}
.sb-e{background:rgba(58,90,46,.1);color:#3a5a2e}.sb-l{background:rgba(184,154,90,.15);color:#b89a5a}.sb-p{background:rgba(196,83,74,.1);color:#c4534a}
.pbw{height:5px;background:rgba(0,0,0,.06);border-radius:3px;overflow:hidden;margin-top:4px}
.pbf{height:100%;border-radius:3px}
.barch{display:flex;align-items:flex-end;gap:3px;padding:0 4px;margin-bottom:20px}
.barc{flex:1;min-width:8px;border-radius:3px 3px 0 0;position:relative}
.barl{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:7px;color:#7a7a6a;white-space:nowrap}
.invhdr{background:#f5ede0;padding:20px;text-align:center;border-bottom:2px solid rgba(58,90,46,.15);border-radius:14px 14px 0 0}
.invhdr img{height:52px;width:auto}
.fw{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:6px 8px;text-align:left;color:#7a7a6a;font-weight:500;font-size:9px;letter-spacing:1px;border-bottom:1px solid rgba(58,90,46,.1)}
td{padding:6px 8px;border-bottom:1px solid rgba(58,90,46,.07)}
@media(min-width:600px){.kg2{grid-template-columns:repeat(4,1fr)}}
</style>
</head>

// ── Tasa Binance + Factura ──
function fetchTasaBs(cb){
  var now=Date.now();if(tasaBs&&(now-tasaTime)<600000){cb(tasaBs,tasaSrc);return;}
  var srcs=[{url:"https://pydolarve.org/api/v1/dollar?monitor=binance",parse:function(d){return d&&d.price?parseFloat(d.price):null;},name:"PyDolarVe"},{url:"https://ve.dolarapi.com/v1/dolares/binance",parse:function(d){return d&&d.promedio?parseFloat(d.promedio):null;},name:"DolarAPI"}];
  var tried=0;
  function next(){if(tried>=srcs.length){cb(tasaBs,tasaSrc||"sin tasa");return;}var s=srcs[tried++];fetch(s.url).then(function(r){return r.json();}).then(function(d){var rate=s.parse(d);if(rate&&rate>10){tasaBs=rate;tasaSrc=s.name;tasaTime=Date.now();cb(tasaBs,tasaSrc);}else next();}).catch(function(){next();});}
  next();
}
